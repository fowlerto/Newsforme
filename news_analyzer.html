<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News Breakdown Media Analyzer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&family=Roboto+Condensed:wght@400;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0c14;
    --surface: #111420;
    --surface2: #181d2e;
    --border: #252b45;
    --blue: #60a5fa;
    --blue-bright: #60a5fa;
    --text: #e2e8f0;
    --muted: #8892a4;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .banner-wrap {
    width: 100%;
    max-width: 800px;
  }
  .banner-wrap img {
    width: 100%;
    display: block;
    border-bottom: 3px solid #60a5fa;
  }

  .container {
    width: 100%;
    max-width: 800px;
    padding: 24px 16px 60px;
  }

  .input-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 24px;
  }

  .input-label {
    font-family: 'Roboto Condensed', sans-serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--blue-bright);
    margin-bottom: 10px;
    display: block;
  }

  textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    padding: 14px;
    resize: vertical;
    min-height: 140px;
    outline: none;
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: var(--blue); }
  textarea::placeholder { color: var(--muted); }

  .input-row {
    display: flex;
    gap: 10px;
    margin-top: 12px;
    flex-wrap: wrap;
  }

  .url-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    min-width: 200px;
    transition: border-color 0.2s;
  }
  .url-input:focus { border-color: var(--blue); }
  .url-input::placeholder { color: var(--muted); }

  .btn {
    padding: 10px 22px;
    border-radius: 8px;
    font-family: 'Roboto Condensed', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--blue), #2563eb);
    color: white;
    box-shadow: 0 0 20px rgba(96,165,250,0.3);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 0 30px rgba(96,165,250,0.5); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .btn-secondary {
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--blue); color: var(--text); }

  .response-section { display: none; }
  .response-section.visible { display: block; }

  .response-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 16px;
  }

  .section-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(96,165,250,0.15);
    border: 1px solid rgba(96,165,250,0.4);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--blue-bright);
    margin-bottom: 12px;
  }

  .response-text {
    font-size: 15px;
    line-height: 1.75;
    color: #cbd5e1;
  }
  .response-text p + p { margin-top: 12px; }

  .choice-section { display: none; flex-direction: column; gap: 10px; margin-top: 16px; }
  .choice-section.visible { display: flex; }

  .choice-prompt {
    font-family: 'Roboto Condensed', sans-serif;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .choices { display: flex; flex-wrap: wrap; gap: 10px; }

  .choice-btn {
    padding: 10px 18px;
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    transition: all 0.2s;
  }
  .choice-btn:hover { border-color: var(--blue); background: rgba(96,165,250,0.1); color: var(--blue-bright); }
  .choice-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .loading { display: none; align-items: center; gap: 12px; padding: 16px 0; color: var(--muted); font-size: 14px; }
  .loading.visible { display: flex; }

  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>

<div class="container">
  <div class="input-section">
    <span class="input-label">Paste article text or enter a URL to analyze</span>
    <textarea id="articleText" placeholder="Paste the full article text here..."></textarea>
    <div class="input-row">
      <input type="text" id="urlInput" class="url-input" placeholder="Or enter a URL (e.g. https://...)">
      <button class="btn btn-primary" id="analyzeBtn" onclick="startAnalysis()">Break It Down</button>
      <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
    </div>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <span id="loadingText">Analyzing content...</span>
  </div>

  <div class="response-section" id="responseSection">

    <div class="response-card" id="summaryCard">
      <div class="section-tag">Opening Summary</div>
      <div class="response-text" id="summaryText"></div>
    </div>

    <div class="choice-section" id="depthChoice">
      <div class="choice-prompt">Want to go deeper?</div>
      <div class="choices">
        <button class="choice-btn" onclick="handleDepthChoice('thanks')">That's enough, thanks</button>
        <button class="choice-btn" onclick="handleDepthChoice('deeper')">Deeper Summary</button>
        <button class="choice-btn" onclick="handleDepthChoice('full')">Full Analysis</button>
      </div>
    </div>

    <div class="response-card" id="deeperCard" style="display:none">
      <div class="section-tag" id="deeperTag">Deeper Analysis</div>
      <div class="response-text" id="deeperText"></div>
    </div>

    <div class="choice-section" id="spiritualChoice">
      <div class="choice-prompt">Would you like a spiritual perspective on this?</div>
      <div class="choices">
        <button class="choice-btn" onclick="handleSpiritualChoice('yes')">Yes</button>
        <button class="choice-btn" onclick="handleSpiritualChoice('no')">No thanks</button>
      </div>
    </div>

    <div class="response-card" id="spiritualCard" style="display:none">
      <div class="section-tag">Spiritual Perspective</div>
      <div class="response-text" id="spiritualText"></div>
    </div>

  </div>
</div>

<script>
let conversationHistory = [];

const SYSTEM_PROMPT = `You are an experienced political and cultural analyst with deep knowledge of media, rhetoric, and information warfare. You are also a knowledgeable Christian theologian grounded in Scripture. You never lie or make up information or sources. When you don't know something, you say so. When you cite a source, it's real. When you reference Scripture, you use accurate verses and citations.

You write in plain everyday language. No jargon. You explain things like a smart, honest friend — direct, specific, and never bland. Never use markdown formatting like headers, bold, or bullet points. Write in plain prose paragraphs only.`;

async function callClaude(messages) {
  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: SYSTEM_PROMPT,
      messages: messages
    })
  });
  const data = await response.json();
  return data.content?.[0]?.text || 'Unable to analyze. Please try again.';
}

function setLoading(text) {
  document.getElementById('loading').classList.add('visible');
  document.getElementById('loadingText').textContent = text || 'Analyzing...';
}

function hideLoading() {
  document.getElementById('loading').classList.remove('visible');
}

function renderText(elementId, text) {
  const el = document.getElementById(elementId);
  const paragraphs = text.split('\n\n').filter(p => p.trim());
  el.innerHTML = paragraphs.map(p => `<p>${p.trim()}</p>`).join('');
}

async function startAnalysis() {
  const text = document.getElementById('articleText').value.trim();
  const url = document.getElementById('urlInput').value.trim();

  if (!text && !url) {
    alert('Please paste article text or enter a URL.');
    return;
  }

  conversationHistory = [];

  document.getElementById('analyzeBtn').disabled = true;
  document.getElementById('depthChoice').classList.remove('visible');
  document.getElementById('deeperCard').style.display = 'none';
  document.getElementById('spiritualChoice').classList.remove('visible');
  document.getElementById('spiritualCard').style.display = 'none';

  setLoading('Breaking it down...');

  const userMsg = text
    ? `Please analyze this article and give me a 3-5 sentence opening summary covering what it says, where it appears biased or incomplete, and your honest take. Write in plain prose paragraphs only — no headers or bullet points.\n\n${text}`
    : `Please analyze the article at this URL and give me a 3-5 sentence opening summary covering what it says, where it appears biased or incomplete, and your honest take. Write in plain prose paragraphs only — no headers or bullet points.\n\nURL: ${url}`;

  conversationHistory.push({ role: 'user', content: userMsg });

  try {
    const response = await callClaude(conversationHistory);
    conversationHistory.push({ role: 'assistant', content: response });

    hideLoading();
    document.getElementById('responseSection').classList.add('visible');
    renderText('summaryText', response);
    document.getElementById('depthChoice').classList.add('visible');
  } catch (err) {
    hideLoading();
    alert('Error analyzing content. Please try again.');
  }

  document.getElementById('analyzeBtn').disabled = false;
}

async function handleDepthChoice(choice) {
  document.querySelectorAll('#depthChoice .choice-btn').forEach(b => b.disabled = true);

  if (choice === 'thanks') {
    document.getElementById('depthChoice').classList.remove('visible');
    document.getElementById('spiritualChoice').classList.add('visible');
    return;
  }

  const prompt = choice === 'deeper'
    ? 'Give me a deeper summary — 2-3 paragraphs expanding on the bias, what is missing, and the gray areas. Plain prose only, no headers or bullets.'
    : 'Give me the full analysis covering: key facts and what the article claims, source credibility, bias and rhetorical techniques, what perspectives are missing, your bottom line on how much to trust this, and any 5th Generation Warfare indicators. Write in plain prose paragraphs, separating each topic with a blank line.';

  conversationHistory.push({ role: 'user', content: prompt });
  setLoading(choice === 'deeper' ? 'Going deeper...' : 'Running full analysis...');

  try {
    const response = await callClaude(conversationHistory);
    conversationHistory.push({ role: 'assistant', content: response });

    hideLoading();
    document.getElementById('deeperTag').textContent = choice === 'full' ? 'Full Analysis' : 'Deeper Summary';
    document.getElementById('deeperCard').style.display = 'block';
    renderText('deeperText', response);
    document.getElementById('depthChoice').classList.remove('visible');
    document.getElementById('spiritualChoice').classList.add('visible');
  } catch (err) {
    hideLoading();
    document.querySelectorAll('#depthChoice .choice-btn').forEach(b => b.disabled = false);
    alert('Error. Please try again.');
  }
}

async function handleSpiritualChoice(choice) {
  document.querySelectorAll('#spiritualChoice .choice-btn').forEach(b => b.disabled = true);
  document.getElementById('spiritualChoice').classList.remove('visible');

  if (choice === 'no') return;

  conversationHistory.push({
    role: 'user',
    content: 'Give me a spiritual perspective from a Christian worldview. 1-3 paragraphs, specific to this issue, using accurately cited Bible verses where they naturally apply. Write conversationally like talking to a thoughtful believer over coffee — not like a sermon. No headers.'
  });

  setLoading('Seeking a higher view...');

  try {
    const response = await callClaude(conversationHistory);
    conversationHistory.push({ role: 'assistant', content: response });
    hideLoading();
    document.getElementById('spiritualCard').style.display = 'block';
    renderText('spiritualText', response);
  } catch (err) {
    hideLoading();
    alert('Error. Please try again.');
  }
}

function clearAll() {
  document.getElementById('articleText').value = '';
  document.getElementById('urlInput').value = '';
  document.getElementById('responseSection').classList.remove('visible');
  document.getElementById('depthChoice').classList.remove('visible');
  document.getElementById('deeperCard').style.display = 'none';
  document.getElementById('spiritualChoice').classList.remove('visible');
  document.getElementById('spiritualCard').style.display = 'none';
  conversationHistory = [];
}
</script>

</body>
</html>
