<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Clear Eye</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,600&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg0: #080a12;
  --bg1: #0d1020;
  --surface: rgba(255,255,255,0.055);
  --surface-hi: rgba(255,255,255,0.09);
  --border: rgba(255,255,255,0.1);
  --border-hi: rgba(255,255,255,0.18);
  --text: #eef0ff;
  --text2: rgba(238,240,255,0.62);
  --text3: rgba(238,240,255,0.35);
  --accent: #6c8eff;
  --accent2: #b48bff;
  --gold: #f0b429;
  --radius: 18px;
  --radius-sm: 13px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg0);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* BG ORBS */
.bg-orbs { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.orb { position: absolute; border-radius: 50%; filter: blur(90px); }
.orb1 { width: 380px; height: 380px; background: radial-gradient(circle, #2040c0 0%, transparent 70%); opacity: 0.22; top: -120px; left: -100px; animation: drift1 16s ease-in-out infinite alternate; }
.orb2 { width: 300px; height: 300px; background: radial-gradient(circle, #6020a0 0%, transparent 70%); opacity: 0.18; top: 35%; right: -80px; animation: drift2 20s ease-in-out infinite alternate; }
.orb3 { width: 240px; height: 240px; background: radial-gradient(circle, #0870c0 0%, transparent 70%); opacity: 0.15; bottom: 25%; left: 10%; animation: drift3 24s ease-in-out infinite alternate; }
@keyframes drift1 { to { transform: translate(30px, 50px); } }
@keyframes drift2 { to { transform: translate(-25px, 70px); } }
@keyframes drift3 { to { transform: translate(50px, -40px); } }

/* KEY SCREEN */
#keyScreen {
  position: fixed; inset: 0; z-index: 999;
  background: linear-gradient(160deg, #0c0f22 0%, #070910 100%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px 28px;
  transition: opacity 0.35s ease;
}
.key-icon {
  width: 76px; height: 76px; border-radius: 22px;
  background: linear-gradient(140deg, #2f52d4 0%, #7040cc 100%);
  display: flex; align-items: center; justify-content: center;
  font-size: 36px; margin-bottom: 22px;
  box-shadow: 0 16px 48px rgba(80,120,255,0.4), 0 0 0 1px rgba(255,255,255,0.1) inset;
}
#keyScreen h2 {
  font-family: 'Fraunces', serif;
  font-size: 34px; font-weight: 700; letter-spacing: -0.5px;
  color: var(--text); margin-bottom: 8px;
}
.key-sub {
  font-size: 14px; color: var(--text2); line-height: 1.6;
  text-align: center; margin-bottom: 32px; max-width: 280px;
}
.key-field-wrap {
  width: 100%; max-width: 340px; position: relative; margin-bottom: 10px;
}
.key-field-wrap .lock-icon {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  font-size: 16px; opacity: 0.4; pointer-events: none;
}
#apiKeyInput {
  width: 100%;
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 14px 14px 42px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px; color: var(--text);
  outline: none; letter-spacing: 0.3px;
  transition: border-color 0.2s, background 0.2s;
  -webkit-appearance: none;
}
#apiKeyInput:focus { border-color: var(--accent); background: rgba(108,142,255,0.07); }
#apiKeyInput::placeholder { color: var(--text3); font-size: 13px; }

.remember-row {
  display: flex; align-items: center; gap: 9px;
  max-width: 340px; width: 100%; margin-bottom: 16px; cursor: pointer;
}
.remember-row input[type="checkbox"] {
  width: 18px; height: 18px; accent-color: var(--accent);
  cursor: pointer; border-radius: 5px; flex-shrink: 0;
}
.remember-row span { font-size: 13px; color: var(--text2); }

#saveKeyBtn {
  width: 100%; max-width: 340px;
  background: linear-gradient(135deg, #3050d8 0%, #6840d0 100%);
  color: white; border: none; border-radius: var(--radius-sm);
  padding: 15px; font-family: 'DM Sans', sans-serif;
  font-size: 16px; font-weight: 600; cursor: pointer;
  box-shadow: 0 8px 28px rgba(80,120,255,0.4);
  transition: opacity 0.15s, transform 0.1s;
}
#saveKeyBtn:active { opacity: 0.85; transform: scale(0.98); }

.key-note {
  font-size: 12px; color: var(--text3); margin-top: 16px;
  text-align: center; max-width: 300px; line-height: 1.7;
}
.key-note a { color: var(--accent2); text-decoration: none; }

#forgetBtn {
  background: transparent; border: none; font-size: 12px;
  color: var(--text3); margin-top: 12px; cursor: pointer;
  font-family: 'DM Sans', sans-serif; transition: color 0.15s;
}
#forgetBtn:active { color: #f87171; }

/* HEADER */
header {
  position: sticky; top: 0; z-index: 50;
  background: rgba(8,10,18,0.8);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
}
.header-inner {
  max-width: 520px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
}
.logo-group { display: flex; align-items: center; gap: 12px; }
.logo-badge {
  width: 36px; height: 36px; border-radius: 10px;
  background: linear-gradient(140deg, #2f52d4, #7040cc);
  display: flex; align-items: center; justify-content: center; font-size: 18px;
  box-shadow: 0 3px 14px rgba(80,120,255,0.35);
}
.logo-text h1 {
  font-family: 'Fraunces', serif; font-size: 18px; font-weight: 700;
  letter-spacing: -0.3px; color: var(--text); line-height: 1;
}
.logo-text p {
  font-size: 10px; color: var(--accent); letter-spacing: 1.5px;
  text-transform: uppercase; font-weight: 500; margin-top: 2px;
}
#headerReset {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; padding: 7px 15px;
  font-size: 12px; color: var(--text2); font-weight: 500;
  font-family: 'DM Sans', sans-serif; cursor: pointer; display: none;
  transition: background 0.15s;
}
#headerReset:active { background: var(--surface-hi); }

/* MAIN */
main {
  position: relative; z-index: 1;
  padding: 22px 16px 120px;
  max-width: 520px; margin: 0 auto;
}

/* INPUT CARD */
.input-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  box-shadow: 0 4px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.04) inset;
  margin-bottom: 20px;
  animation: cardIn 0.5s cubic-bezier(0.34,1.4,0.64,1);
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(24px) scale(0.96); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.section-label {
  font-size: 11px; font-weight: 600; color: var(--text3);
  letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 14px;
}

/* Segment control */
.segment {
  display: flex; background: rgba(0,0,0,0.35);
  border-radius: 11px; padding: 3px; margin-bottom: 14px;
  border: 1px solid var(--border);
}
.seg-btn {
  flex: 1; background: transparent; border: none;
  padding: 9px 10px; border-radius: 9px;
  font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
  color: var(--text3); cursor: pointer;
  transition: all 0.22s cubic-bezier(0.34,1.2,0.64,1);
}
.seg-btn.active {
  background: rgba(255,255,255,0.1);
  color: var(--text);
  box-shadow: 0 1px 8px rgba(0,0,0,0.5);
}

textarea, input[type="url"] {
  width: 100%; background: rgba(0,0,0,0.3);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 14px; font-family: 'DM Sans', sans-serif;
  font-size: 14px; color: var(--text); resize: none; outline: none;
  transition: border-color 0.2s, background 0.2s;
  -webkit-appearance: none; line-height: 1.55;
}
textarea:focus, input[type="url"]:focus {
  border-color: var(--accent); background: rgba(108,142,255,0.07);
}
textarea { height: 128px; }
input[type="url"] { height: 48px; }
::placeholder { color: var(--text3); font-size: 13px; font-style: italic; }

.analyze-btn {
  width: 100%; margin-top: 14px;
  background: linear-gradient(135deg, #3050d8 0%, #6840d0 100%);
  color: white; border: none; border-radius: var(--radius-sm); padding: 15px;
  font-family: 'Fraunces', serif; font-size: 18px; font-weight: 600; font-style: italic;
  cursor: pointer; letter-spacing: 0.2px;
  box-shadow: 0 8px 28px rgba(80,120,255,0.4);
  transition: all 0.12s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.analyze-btn:active { transform: scale(0.97); opacity: 0.88; }

/* MESSAGES */
.messages { display: flex; flex-direction: column; gap: 12px; }

.msg {
  border-radius: var(--radius); padding: 16px 18px;
  border: 1px solid var(--border);
  animation: msgIn 0.4s cubic-bezier(0.34,1.3,0.64,1);
}
@keyframes msgIn {
  from { opacity: 0; transform: translateY(14px) scale(0.96); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.msg.user-msg {
  background: linear-gradient(135deg, rgba(48,80,216,0.22), rgba(104,64,208,0.16));
  border-color: rgba(108,142,255,0.22); margin-left: 28px;
}
.msg.analyst-msg {
  background: var(--surface);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
}

.msg-label {
  font-size: 10px; font-weight: 600; letter-spacing: 1.5px;
  text-transform: uppercase; margin-bottom: 9px;
  display: flex; align-items: center; gap: 7px;
}
.msg-label.user { color: var(--accent); }
.msg-label.analyst { color: var(--accent2); }
.dot {
  width: 6px; height: 6px; border-radius: 50%; display: inline-block; flex-shrink: 0;
}
.msg-label.user .dot { background: var(--accent); }
.msg-label.analyst .dot { background: var(--accent2); box-shadow: 0 0 7px var(--accent2); }

.msg-body {
  font-size: 14.5px; line-height: 1.72;
  color: rgba(238,240,255,0.85); white-space: pre-wrap; word-break: break-word;
}
.msg-body h3 {
  font-family: 'Fraunces', serif; font-size: 15px; font-weight: 600; font-style: italic;
  margin: 16px 0 7px; color: var(--text);
  display: flex; align-items: center; gap: 9px;
}
.msg-body h3::before {
  content: ''; width: 3px; height: 15px; border-radius: 2px; flex-shrink: 0;
  background: linear-gradient(to bottom, var(--accent), var(--accent2));
}

/* CHOICES */
.choices-card {
  background: rgba(15,18,32,0.75);
  border: 1px solid var(--border); border-radius: var(--radius); padding: 16px;
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  animation: msgIn 0.4s cubic-bezier(0.34,1.3,0.64,1);
}
.choices-question {
  font-family: 'Fraunces', serif; font-size: 16px; font-weight: 600; font-style: italic;
  color: var(--text); margin-bottom: 12px; padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.choice-btn {
  display: flex; align-items: center; justify-content: space-between; width: 100%;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 13px 16px; margin-bottom: 8px;
  font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
  color: var(--text); text-align: left; cursor: pointer; transition: all 0.15s;
}
.choice-btn:last-child { margin-bottom: 0; }
.choice-btn .chevron { font-size: 18px; color: var(--text3); transition: transform 0.15s; }
.choice-btn:active { background: var(--surface-hi); transform: scale(0.98); }
.choice-btn:active .chevron { transform: translateX(3px); }

/* LOADING */
.loading-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px 20px;
  display: flex; align-items: center; gap: 14px;
  animation: msgIn 0.25s ease;
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
}
.spinner-wrap {
  width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
  background: linear-gradient(140deg, #3050d8, #7040cc);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; position: relative;
}
.spinner-wrap::after {
  content: ''; position: absolute; inset: -4px; border-radius: 50%;
  border: 2px solid transparent;
  border-top-color: rgba(108,142,255,0.7);
  border-right-color: rgba(108,142,255,0.3);
  animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 13px; color: var(--text2); font-style: italic; }

/* SECTION DIVIDER */
.section-divider {
  display: flex; align-items: center; gap: 12px; margin: 4px 0 16px;
}
.section-divider::before, .section-divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}
.section-divider span {
  font-size: 10px; color: var(--text3); letter-spacing: 2px;
  text-transform: uppercase; font-weight: 500;
}

/* SAFE AREA */
@supports (padding-bottom: env(safe-area-inset-bottom)) {
  main { padding-bottom: calc(120px + env(safe-area-inset-bottom)); }
}
</style>
</head>
<body>

<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<!-- API KEY GATE -->
<div id="keyScreen">
  <div class="key-icon">👁</div>
  <h2>Clear Eye</h2>
  <p class="key-sub">Bias detection, credibility analysis &amp; the bigger picture. Enter your Anthropic API key to begin.</p>

  <div class="key-field-wrap">
    <span class="lock-icon">🔑</span>
    <input id="apiKeyInput" type="password" placeholder="sk-ant-…" autocomplete="off" spellcheck="false">
  </div>

  <label class="remember-row">
    <input type="checkbox" id="rememberKey">
    <span>Remember my key on this device</span>
  </label>

  <button id="saveKeyBtn" onclick="saveKey()">Continue →</button>

  <p class="key-note">
    Get a key at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a><br>
    Your key is stored only on your device.
  </p>
  <button onclick="forgetKey()" id="forgetBtn" style="display:none">✕ Forget saved key</button>
</div>

<!-- HEADER -->
<header>
  <div class="header-inner">
    <div class="logo-group">
      <div class="logo-badge">👁</div>
      <div class="logo-text">
        <h1>Clear Eye</h1>
        <p>Media Analyzer</p>
      </div>
    </div>
    <button id="headerReset" onclick="resetAll()">↺ New Article</button>
  </div>
</header>

<main>
  <div class="input-card" id="inputCard">
    <p class="section-label">Analyze any article, post, or transcript</p>
    <div class="segment">
      <button class="seg-btn active" onclick="switchTab('text', this)">✏️&nbsp; Paste Text</button>
      <button class="seg-btn" onclick="switchTab('url', this)">🔗&nbsp; Enter URL</button>
    </div>
    <div id="textInput">
      <textarea id="articleText" placeholder="Paste the article, transcript, social post, or any media content here…"></textarea>
    </div>
    <div id="urlInput" style="display:none">
      <input type="url" id="articleUrl" placeholder="https://…">
    </div>
    <button class="analyze-btn" onclick="startAnalysis()">
      <span>Analyze</span><span style="font-style:normal">→</span>
    </button>
  </div>

  <div class="section-divider" id="analysisLabel" style="display:none">
    <span>Analysis</span>
  </div>

  <div class="messages" id="messages"></div>
</main>

<script>
let userApiKey = '';

window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('cleareye_apikey');
  if (saved) {
    document.getElementById('apiKeyInput').value = saved;
    document.getElementById('rememberKey').checked = true;
    document.getElementById('forgetBtn').style.display = 'block';
  }
});

function saveKey() {
  const val = document.getElementById('apiKeyInput').value.trim();
  if (!val.startsWith('sk-ant-')) {
    alert('That doesn\'t look like a valid Anthropic API key (should start with sk-ant-). Please check and try again.');
    return;
  }
  userApiKey = val;
  if (document.getElementById('rememberKey').checked) {
    localStorage.setItem('cleareye_apikey', val);
  } else {
    localStorage.removeItem('cleareye_apikey');
  }
  const screen = document.getElementById('keyScreen');
  screen.style.opacity = '0';
  setTimeout(() => screen.style.display = 'none', 350);
}

function forgetKey() {
  localStorage.removeItem('cleareye_apikey');
  document.getElementById('apiKeyInput').value = '';
  document.getElementById('rememberKey').checked = false;
  document.getElementById('forgetBtn').style.display = 'none';
}

document.getElementById('apiKeyInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') saveKey();
});

const SYSTEM_PROMPT = `You are an experienced political and cultural analyst with deep knowledge of media, rhetoric, and information warfare. You are also a knowledgeable Christian theologian grounded in Scripture. You never lie or make up information or sources. When you don't know something, you say so. When you cite a source, it's real. When you reference Scripture, you use accurate verses and citations.

You write in plain everyday language. No jargon. Like a smart, honest friend — direct, specific, and never bland.

Your task: analyze media content for bias, credibility, key facts, rhetorical techniques, and 5th generation warfare indicators. The user will provide text or a URL to an article, post, transcript, or other media content.

OPENING SUMMARY (your first response):
Write a tight 3-5 sentence paragraph in plain everyday language. Cover what the article says, where it appears biased or incomplete, and your honest take. No headers. No bullet points. No markdown formatting. Just a conversational paragraph.

End your response with exactly this line on its own:
CHOICES:deeper_or_done

DEEPER SUMMARY (when requested):
Write 2-3 paragraphs. No headers, no bullet points. Cover:
- What the article is really claiming
- Where it's biased, what it leaves out, how it steers the reader
- Gray areas being flattened
- How much to trust it

End your response with:
CHOICES:spiritual

FULL ANALYSIS (when requested):
Deliver section-by-section. Use these exact section headers (prefixed with ###):
### Key Facts & Summary
### Source & Credibility
### Bias & Rhetorical Analysis
### What's Missing — The Gray Area
### Bottom Line
### 5th Generation Warfare Assessment

Note: You cannot fetch URLs yourself in this app. If the user provides a URL, acknowledge you are analyzing based on the URL provided, and ask them to also paste the text if possible, OR attempt to analyze from the URL alone if you recognize the source. Be honest about limitations.

After any analysis, end with:
CHOICES:spiritual

SPIRITUAL PERSPECTIVE (when requested):
1-3 paragraphs. Fresh, specific, conversational — like talking to a thoughtful believer over coffee. Use accurate Bible verses (book, chapter, verse) naturally where they fit. Never formulaic.

End with:
CHOICES:done

When you see CHOICES:done, respond with exactly: DONE

Keep all responses plain text — no markdown bold/italic, no bullet dashes, just clean prose and the ### headers for full analysis sections only.`;

let conversationHistory = [];
let currentMode = 'text';
let awaitingChoice = null;
let articleContent = '';

function switchTab(mode, btn) {
  currentMode = mode;
  document.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('textInput').style.display = mode === 'text' ? 'block' : 'none';
  document.getElementById('urlInput').style.display = mode === 'url' ? 'block' : 'none';
}

async function startAnalysis() {
  const text = currentMode === 'text'
    ? document.getElementById('articleText').value.trim()
    : document.getElementById('articleUrl').value.trim();
  if (!text) { alert('Please paste an article or enter a URL first.'); return; }

  articleContent = text;
  document.getElementById('inputCard').style.display = 'none';
  document.getElementById('analysisLabel').style.display = 'flex';
  document.getElementById('headerReset').style.display = 'block';

  const userMsg = currentMode === 'text'
    ? `Please analyze this article:\n\n${text}`
    : `Please analyze this article: ${text}`;

  conversationHistory.push({ role: 'user', content: userMsg });
  addUserBubble(currentMode === 'text' ? '📄 Article submitted for analysis' : `🔗 ${text}`);
  await callClaude('Reading between the lines…');
}

async function handleChoice(choice, displayLabel) {
  awaitingChoice = null;
  removeChoices();
  addUserBubble(displayLabel);
  conversationHistory.push({ role: 'user', content: choice });
  await callClaude('Digging deeper…');
}

async function callClaude(loadingMsg) {
  const loadingEl = addLoading(loadingMsg);
  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': userApiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });
    const data = await response.json();
    loadingEl.remove();
    const rawText = data.content?.map(b => b.text || '').join('') || '';
    const [mainText, choicesTag] = splitOnChoices(rawText);
    if (mainText.trim()) {
      addAssistantBubble(mainText.trim());
      conversationHistory.push({ role: 'assistant', content: rawText });
    }
    if (choicesTag) renderChoices(choicesTag);
  } catch (err) {
    loadingEl.remove();
    addAssistantBubble('Something went wrong reaching the analysis service. Please try again.');
    console.error(err);
  }
}

function splitOnChoices(text) {
  const idx = text.indexOf('CHOICES:');
  if (idx === -1) return [text, null];
  return [text.slice(0, idx).trim(), text.slice(idx + 8).trim()];
}

function renderChoices(tag) {
  const container = document.getElementById('messages');
  const card = document.createElement('div');
  card.className = 'choices-card';
  card.id = 'choicesCard';

  if (tag === 'deeper_or_done') {
    card.innerHTML = `
      <p class="choices-question">Want to go deeper?</p>
      <button class="choice-btn" onclick="handleChoice('Please give me a deeper summary.','Deeper summary')"><span>Deeper summary</span><span class="chevron">›</span></button>
      <button class="choice-btn" onclick="handleChoice('Please give me the full analysis.','Full analysis')"><span>Full analysis</span><span class="chevron">›</span></button>
      <button class="choice-btn" onclick="handleChoice('That is enough, thanks.','That\\'s enough, thanks')"><span>That's enough, thanks</span><span class="chevron">›</span></button>`;
  } else if (tag === 'spiritual') {
    card.innerHTML = `
      <p class="choices-question">Would you like a spiritual perspective?</p>
      <button class="choice-btn" onclick="handleChoice('Yes, please give me a spiritual perspective.','Yes — spiritual perspective')"><span>Yes, show me</span><span class="chevron">›</span></button>
      <button class="choice-btn" onclick="handleChoice('No thanks.','No thanks')"><span>No thanks</span><span class="chevron">›</span></button>`;
  } else if (tag === 'done') {
    return;
  }

  container.appendChild(card);
  card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function removeChoices() {
  const el = document.getElementById('choicesCard');
  if (el) el.remove();
}

function addUserBubble(text) {
  const el = document.createElement('div');
  el.className = 'msg user-msg';
  el.innerHTML = `<div class="msg-label user"><span class="dot"></span>You</div><div class="msg-body">${escapeHtml(text)}</div>`;
  document.getElementById('messages').appendChild(el);
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function addAssistantBubble(text) {
  const el = document.createElement('div');
  el.className = 'msg analyst-msg';
  const formatted = text
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/\n/g, '<br>');
  el.innerHTML = `<div class="msg-label analyst"><span class="dot"></span>Clear Eye Analyst</div><div class="msg-body">${formatted}</div>`;
  document.getElementById('messages').appendChild(el);
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function addLoading(msg) {
  const el = document.createElement('div');
  el.className = 'loading-card';
  el.innerHTML = `<div class="spinner-wrap">👁</div><span class="loading-text">${escapeHtml(msg)}</span>`;
  document.getElementById('messages').appendChild(el);
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  return el;
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function resetAll() {
  conversationHistory = [];
  articleContent = '';
  awaitingChoice = null;
  document.getElementById('messages').innerHTML = '';
  document.getElementById('inputCard').style.display = 'block';
  document.getElementById('analysisLabel').style.display = 'none';
  document.getElementById('headerReset').style.display = 'none';
  document.getElementById('articleText').value = '';
  document.getElementById('articleUrl').value = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
