<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bias Sword — Media Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg1: #0a0c15; --bg2: #0f1525; --bg3: #0a0e1a;
    --glass: rgba(255,255,255,0.03); --glass-border: rgba(255,255,255,0.06);
    --blue: #5b8af0; --purple: #7b5bf0; --blue-light: #8cb4ff; --purple-light: #c49bff;
    --text: #c8d0e0; --text-dim: #5a6580; --text-faint: #3d4760; --text-muted: #4a5570;
    --text-section: #b0b8cc;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: linear-gradient(165deg, var(--bg1) 0%, var(--bg2) 50%, var(--bg3) 100%);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
  .orb1, .orb2 {
    position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
  }
  .orb1 {
    top: -20%; left: -10%; width: 60%; height: 60%;
    background: radial-gradient(circle, rgba(91,138,240,0.06) 0%, transparent 70%);
    animation: drift1 25s ease-in-out infinite;
  }
  .orb2 {
    bottom: -15%; right: -15%; width: 50%; height: 50%;
    background: radial-gradient(circle, rgba(123,91,240,0.05) 0%, transparent 70%);
    animation: drift2 30s ease-in-out infinite;
  }

  /* KEY SCREEN */
  .key-screen {
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 24px;
    position: relative; z-index: 1;
  }
  .key-logo { text-align: center; margin-bottom: 40px; }
  .key-badge {
    width: 64px; height: 64px; border-radius: 20px; margin: 0 auto 16px;
    background: linear-gradient(135deg, rgba(99,140,255,0.2), rgba(140,99,255,0.2));
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; border: 1px solid rgba(99,140,255,0.15);
    box-shadow: 0 0 40px rgba(99,140,255,0.1);
  }
  .key-title {
    font-family: 'Fraunces', serif; font-size: 28px; font-weight: 700;
    background: linear-gradient(135deg, var(--blue-light), var(--purple-light));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .key-sub { font-size: 12px; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 4px; }
  .key-card {
    width: 100%; max-width: 380px; padding: 24px; border-radius: 20px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
  }
  .key-label { font-size: 13px; color: #8892a8; display: block; margin-bottom: 8px; }
  .key-input {
    width: 100%; padding: 14px; border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3);
    color: var(--text); font-family: 'DM Sans', monospace; font-size: 14px; outline: none;
  }
  .key-input:focus { border-color: rgba(91,138,240,0.4); }
  .key-error { color: #ff6b6b; font-size: 12px; margin-top: 6px; }
  .key-remember { display: flex; align-items: center; gap: 8px; margin-top: 12px; }
  .key-remember input { accent-color: var(--blue-light); }
  .key-remember span { font-size: 12px; color: #6a7590; }
  .key-forget {
    background: none; border: none; color: #ff6b8a; font-size: 11px;
    cursor: pointer; margin-top: 8px; padding: 0;
  }
  .key-submit {
    width: 100%; padding: 14px; margin-top: 16px; border-radius: 14px; border: none;
    cursor: pointer; font-size: 15px; font-weight: 600;
    background: linear-gradient(135deg, var(--blue), var(--purple));
    color: #fff; box-shadow: 0 4px 24px rgba(91,138,240,0.3);
  }
  .key-hint { text-align: center; margin-top: 14px; font-size: 10px; color: var(--text-faint); }

  /* HEADER */
  .header {
    padding: 20px 20px 16px; position: sticky; top: 0; z-index: 50;
    background: rgba(10,12,21,0.85); backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .header-inner { max-width: 680px; margin: 0 auto; display: flex; align-items: center; gap: 12px; }
  .header-badge {
    width: 36px; height: 36px; border-radius: 12px;
    background: linear-gradient(135deg, rgba(99,140,255,0.2), rgba(140,99,255,0.2));
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; border: 1px solid rgba(99,140,255,0.12);
  }
  .header-title {
    font-family: 'Fraunces', serif; font-size: 20px; font-weight: 700; margin: 0;
    background: linear-gradient(135deg, var(--blue-light), var(--purple-light));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .header-sub { font-size: 10px; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; margin: 0; }
  .key-btn {
    margin-left: auto; background: none; border: none; color: var(--text-muted);
    font-size: 11px; cursor: pointer;
  }

  /* MAIN */
  .main { max-width: 680px; margin: 0 auto; padding: 20px 16px 60px; position: relative; z-index: 1; }

  /* SEGMENT CONTROL */
  .segment {
    display: flex; gap: 0; margin-bottom: 16px; border-radius: 12px; overflow: hidden;
    background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border); padding: 3px;
  }
  .seg-btn {
    flex: 1; padding: 10px 0; border: none; cursor: pointer;
    font-size: 13px; font-weight: 500; border-radius: 10px;
    font-family: 'DM Sans', sans-serif; transition: all 0.2s;
  }
  .seg-btn.active { background: rgba(91,138,240,0.15); color: var(--blue-light); }
  .seg-btn:not(.active) { background: transparent; color: var(--text-dim); }

  /* TEXTAREA / INPUT */
  .content-input {
    width: 100%; padding: 16px; border-radius: 16px;
    border: 1px solid var(--glass-border); background: var(--glass);
    color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 14px; line-height: 1.7; outline: none; resize: vertical;
  }
  .content-input:focus { border-color: rgba(91,138,240,0.3); }
  textarea.content-input { min-height: 200px; }
  .word-count { margin: 6px 0 0; font-size: 11px; color: var(--text-muted); text-align: right; }

  /* BUTTONS */
  .btn-primary {
    width: 100%; padding: 15px; margin-top: 16px; border-radius: 14px; border: none;
    cursor: pointer; font-size: 15px; font-weight: 600; font-family: 'DM Sans', sans-serif;
    background: linear-gradient(135deg, var(--blue), var(--purple));
    color: #fff; box-shadow: 0 4px 24px rgba(91,138,240,0.25);
    transition: all 0.3s;
  }
  .btn-primary:disabled {
    background: rgba(255,255,255,0.04); color: var(--text-faint);
    box-shadow: none; cursor: not-allowed;
  }
  .btn-action {
    flex: 1; padding: 14px; border-radius: 14px; cursor: pointer;
    font-size: 14px; font-weight: 600; font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .btn-action-fill {
    border: none; background: linear-gradient(135deg, var(--blue), var(--purple));
    color: #fff; box-shadow: 0 4px 20px rgba(91,138,240,0.25);
  }
  .btn-action-outline {
    background: var(--glass); border: 1px solid rgba(140,180,255,0.15);
    color: var(--blue-light);
  }
  .btn-reset {
    width: 100%; padding: 13px; border-radius: 14px; cursor: pointer;
    font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif;
    background: none; border: 1px solid var(--glass-border); color: var(--text-muted);
    margin-top: 4px;
  }
  .model-hint { text-align: center; margin-top: 10px; font-size: 10px; color: var(--text-faint); }
  .action-row { display: flex; gap: 10px; margin-bottom: 14px; }

  /* CARDS */
  .card {
    padding: 20px; border-radius: 18px; margin-bottom: 14px;
    background: var(--glass); border: 1px solid var(--glass-border);
    backdrop-filter: blur(12px);
    animation: slideUp 0.3s ease;
  }
  .card-label-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .card-icon { font-size: 13px; }
  .card-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600;
  }
  .card-via { font-size: 9px; color: var(--text-faint); margin-left: auto; }
  .card-text { margin: 0; font-size: 15px; line-height: 1.85; white-space: pre-wrap; }
  .card-spiritual { background: rgba(140,99,255,0.04); border-color: rgba(140,99,255,0.12); }
  .card-spiritual .card-label { color: var(--purple-light); }
  .card-spiritual .card-text { color: #c8c0d8; }

  /* DEEP ANALYSIS */
  .deep-card {
    border-radius: 18px; margin-bottom: 14px; overflow: hidden;
    border: 1px solid var(--glass-border); background: rgba(255,255,255,0.02);
    backdrop-filter: blur(12px); animation: slideUp 0.3s ease;
  }
  .deep-header {
    padding: 12px 18px; background: rgba(91,138,240,0.06);
    border-bottom: 1px solid rgba(255,255,255,0.04);
    display: flex; align-items: center; gap: 8px;
  }
  .deep-streaming { padding: 18px; }
  .deep-streaming p { margin: 0; font-size: 14px; line-height: 1.85; color: var(--text-section); white-space: pre-wrap; }

  /* SECTIONS */
  .section-btn {
    width: 100%; padding: 14px 18px; display: flex; align-items: center; gap: 10px;
    background: none; border: none; border-bottom: 1px solid rgba(255,255,255,0.04);
    cursor: pointer; text-align: left; font-family: 'DM Sans', sans-serif;
  }
  .section-icon { font-size: 16px; }
  .section-title { font-size: 13px; font-weight: 600; color: var(--blue-light); flex: 1; }
  .section-arrow { font-size: 11px; color: var(--text-muted); transition: transform 0.2s; }
  .section-arrow.open { transform: rotate(180deg); }
  .section-body { padding: 0 18px 16px 44px; }
  .section-body p { margin: 0; font-size: 14px; line-height: 1.85; color: var(--text-section); }

  /* LOADING DOTS */
  .dots { display: flex; gap: 5px; padding: 8px 0; }
  .dots span {
    width: 6px; height: 6px; border-radius: 50%;
    background: linear-gradient(135deg, var(--blue), var(--purple));
  }
  .dots span:nth-child(1) { animation: pulse 1.2s ease-in-out 0s infinite; }
  .dots span:nth-child(2) { animation: pulse 1.2s ease-in-out 0.2s infinite; }
  .dots span:nth-child(3) { animation: pulse 1.2s ease-in-out 0.4s infinite; }

  /* ERROR */
  .error-box {
    padding: 14px; border-radius: 14px; margin-bottom: 16px;
    background: rgba(255,100,100,0.08); border: 1px solid rgba(255,100,100,0.15);
    font-size: 13px; color: #ff8a8a;
  }

  .hidden { display: none !important; }

  @keyframes slideUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
  @keyframes pulse { 0%,100% { opacity:0.3; transform:scale(0.8); } 50% { opacity:1; transform:scale(1); } }
  @keyframes drift1 { 0%,100% { transform:translate(0,0); } 50% { transform:translate(30px,20px); } }
  @keyframes drift2 { 0%,100% { transform:translate(0,0); } 50% { transform:translate(-25px,-15px); } }

  textarea::-webkit-scrollbar { width: 4px; }
  textarea::-webkit-scrollbar-track { background: transparent; }
  textarea::-webkit-scrollbar-thumb { background: rgba(91,138,240,0.15); border-radius: 2px; }
</style>
</head>
<body>

<div class="orb1"></div>
<div class="orb2"></div>

<!-- ═══ KEY SCREEN ═══ -->
<div id="keyScreen" class="key-screen">
  <div class="key-logo">
    <div class="key-badge">🗡️</div>
    <div class="key-title">Bias Sword</div>
    <div class="key-sub">Media Analyzer</div>
  </div>
  <div class="key-card">
    <label class="key-label">Anthropic API Key</label>
    <input type="password" id="keyInput" class="key-input" placeholder="sk-ant-..." autocomplete="off">
    <div id="keyError" class="key-error hidden"></div>
    <div class="key-remember">
      <input type="checkbox" id="keyRemember" checked>
      <span>Remember my key on this device</span>
    </div>
    <button id="keyForget" class="key-forget hidden" onclick="forgetKey()">Forget saved key</button>
    <button class="key-submit" onclick="unlockApp()">Enter →</button>
    <p class="key-hint">Get your key at console.anthropic.com</p>
  </div>
</div>

<!-- ═══ APP ═══ -->
<div id="appScreen" class="hidden">
  <div class="header">
    <div class="header-inner">
      <div class="header-badge">🗡️</div>
      <div>
        <h1 class="header-title">Bias Sword</h1>
        <p class="header-sub">Media Analyzer</p>
      </div>
      <button class="key-btn" onclick="showKeyScreen()">🔑</button>
    </div>
  </div>

  <div class="main" id="mainArea">
    <!-- INPUT -->
    <div id="inputSection">
      <div class="segment">
        <button class="seg-btn active" id="segPaste" onclick="switchMode('paste')">Paste Content</button>
        <button class="seg-btn" id="segUrl" onclick="switchMode('url')">Enter URL</button>
      </div>
      <div id="pasteArea">
        <textarea id="contentInput" class="content-input" placeholder="Paste article text, transcript, social media post, or any media content here…"></textarea>
        <div id="wordCount" class="word-count hidden"></div>
      </div>
      <div id="urlArea" class="hidden">
        <input id="urlInput" class="content-input" placeholder="https://example.com/article">
      </div>
      <button id="analyzeBtn" class="btn-primary" disabled onclick="startSummary()">🗡️ Analyze</button>
      <p class="model-hint">⚡ Quick summary via Haiku · Deep analysis via Sonnet</p>
    </div>

    <!-- ERROR -->
    <div id="errorBox" class="error-box hidden"></div>

    <!-- RESULTS -->
    <div id="results" class="hidden">
      <!-- Summary -->
      <div id="summaryCard" class="card hidden">
        <div class="card-label-row">
          <span class="card-icon">⚡</span>
          <span class="card-label" style="color:var(--blue-light)">Quick Summary</span>
          <span class="card-via">via Haiku</span>
        </div>
        <p id="summaryText" class="card-text"></p>
        <div id="summaryDots" class="dots hidden"><span></span><span></span><span></span></div>
      </div>

      <!-- Action buttons after summary -->
      <div id="summaryActions" class="action-row hidden">
        <button class="btn-action btn-action-fill" onclick="startDeepAnalysis()">🗡️ Full Analysis</button>
        <button class="btn-action btn-action-outline" onclick="startSpiritual()">✝️ Spiritual Lens</button>
      </div>

      <!-- Deep Analysis -->
      <div id="deepCard" class="deep-card hidden">
        <div class="deep-header">
          <span class="card-icon">🗡️</span>
          <span class="card-label" style="color:var(--blue-light)">Full Analysis</span>
          <span class="card-via">via Sonnet</span>
        </div>
        <div id="deepStreaming" class="deep-streaming hidden">
          <p id="deepStreamText"></p>
          <div id="deepDots" class="dots"><span></span><span></span><span></span></div>
        </div>
        <div id="deepSections"></div>
      </div>

      <!-- Spiritual button after analysis -->
      <div id="spiritualBtn" class="hidden" style="margin-bottom:14px">
        <button class="btn-action btn-action-outline" style="width:100%" onclick="startSpiritual()">✝️ Spiritual Perspective</button>
      </div>

      <!-- Spiritual card -->
      <div id="spiritualCard" class="card card-spiritual hidden">
        <div class="card-label-row">
          <span class="card-icon">✝️</span>
          <span class="card-label">Spiritual Perspective</span>
        </div>
        <p id="spiritualText" class="card-text"></p>
        <div id="spiritualDots" class="dots hidden"><span></span><span></span><span></span></div>
      </div>

      <!-- Reset -->
      <button id="resetBtn" class="btn-reset hidden" onclick="resetAll()">← Analyze Something New</button>
    </div>
  </div>
</div>

<script>
// ═══ CONFIG ═══
const HAIKU = 'claude-haiku-4-5-20251001';
const SONNET = 'claude-sonnet-4-20250514';
const STORAGE_KEY = 'biassword_apikey';

const PERSONA = `You are an experienced political and cultural analyst with deep knowledge of media, rhetoric, and information warfare. You are also a knowledgeable Christian theologian grounded in Scripture. You never lie or make up information or sources. When you don't know something, you say so. When you cite a source, it's real. When you reference Scripture, you use accurate verses and citations.\n\nYou write in plain everyday language. No jargon. You explain things like a smart, honest friend — direct, specific, and never bland.`;

const PRINCIPLES = `\nIMPORTANT PRINCIPLES:\n- Always use everyday language. Write like you're talking to a smart friend.\n- Be specific, not vague. Say exactly what the bias is, how it shows up, and what effect it has on the reader.\n- Surface the missing middle. Identify what's being left out by all sides — not just from the opposing political side, but from people caught in the middle, affected parties whose voices aren't part of the debate, and practical realities that complicate both sides' arguments.\n- Acknowledge complexity. Not every piece of content is heavily biased. Not everything is 5GW. Call it like you see it, including when the journalism is solid.\n- Verify before accepting. Claims from governments, militaries, ideological actors, or partisan sources are unverified until independently confirmed. Identify who reported a claim first and what they gain from the narrative.\n- Tool vs. actor. When content attributes outcomes to technology (AI, algorithms, social media, weapons systems), identify who made the human decisions to deploy that technology and authorized its use. Moral and legal responsibility belongs to human beings, not tools.\n- Adversarial reality. Any honest analysis of a contested domain must acknowledge that adversaries are building and using the same capabilities. Coverage that only scrutinizes one side's use is incomplete at best.\n- Never lie or fabricate. Every source, fact, and Bible verse must be real and accurate.\n- Respect copyright. Paraphrase. Keep direct quotes under 15 words.\n- Stay politically neutral. Same standards for all sources.`;

const PROMPT_SUMMARY = PERSONA + `\n\nThe user will give you media content. Deliver a clear, honest summary in 3-5 sentences. Cover what it actually says and claims, where it appears biased or incomplete, what it leaves out, and a quick honest take on trustworthiness.\n\nNo headers. No bullet points. No markdown formatting. Just a tight, conversational paragraph. Plain text only.\n` + PRINCIPLES;

const PROMPT_DEEP = PERSONA + `\n\nThe user will give you media content. Deliver a complete analysis using the sections below. Use plain text with simple section headers (no markdown, no bold, no bullet points — write in paragraphs).\n\nKEY FACTS & SUMMARY\nWhat is this piece actually saying? Core claims, key facts, evidence cited, and what it leaves out.\n\nSOURCE & CREDIBILITY\nWho published this — track record, editorial lean, ownership. Does this piece meet basic standards — sourced claims, named sources, news vs. opinion separation, headline accuracy.\n\nBIAS & RHETORICAL ANALYSIS\nHow is the article framing the issue and what assumptions does the framing sneak in? Loaded language, emotional buttons, structure emphasis, who gets quoted and who doesn't, persuasion techniques at work.\n\nWHAT'S MISSING — THE GRAY AREA\nWhat perspectives, stakeholders, or practical realities are being left out? Where is the issue more complicated than it's being presented? What would a genuinely complete picture include?\n\nBOTTOM LINE\nHow much should you trust this? What should you be cautious about? What would you want to verify? Give it straight.\n\n5TH GENERATION WARFARE ASSESSMENT\nSigns of information warfare: narratives designed to divide or redirect attention, exploitation of identity fault lines, shaping perception rather than reporting reality, undermining trust in other sources, engineering emotional responses that shut down thinking. If the content doesn't show meaningful 5GW indicators, say so. Not everything is information warfare.\n` + PRINCIPLES;

const PROMPT_SPIRITUAL = PERSONA + `\n\nThe user will give you media content and a prior analysis. Add a spiritual perspective in 1-3 paragraphs. Plain text only, no markdown.\n\nCore framework (use as lens, not checklist — never recite these formulaically):\n- We are in a real war between the kingdom of God and the kingdom of darkness. Bigger than earthly politics.\n- The victory has been won through the death, burial, and resurrection of Jesus. The kingdom of darkness still fights.\n- Ephesians 6:12 — the enemies are not flesh and blood. Not politicians, media companies, or people on the other side. The battle is spiritual.\n- Satan is a thief, liar, accuser, and deceiver. Hatred and chaos divide, and divided people forget their first love.\n- The enemy drives complex issues to extremes because extremes produce pride, contempt, and hatred — pulling believers from love.\n- The enemy doesn't care which side you're on. He wins if you hate. He wins if you stop seeing image-bearers.\n- The believer responds with truth, righteousness, the gospel, faith, prayer, perseverance, and love. Think biblically before politically.\n- Jesus is returning for His Bride. Is what I'm consuming preparing me, or pulling me into bitterness? Have I forgotten my first love?\n\nStep above the content. Don't re-analyze the content. Look at the bigger-picture spiritual battle the article brings to the surface. What is the deeper conflict? How is the enemy exploiting it on both sides? What would it look like to engage from love, truth, and faith?\n\nUse Bible verses where they naturally apply — not as proof texts jammed in, but as the living Word speaking to the specific situation.\n\nWrite like you're talking to a thoughtful believer over coffee. Be specific to the issue. Vary the approach. This section should never feel like a formula.`;

// ═══ STATE ═══
let apiKey = '';
let inputMode = 'paste';
let summaryText = '';
let analysisText = '';
let spiritualTextVal = '';
let isStreaming = false;

// ═══ DOM HELPERS ═══
const $ = id => document.getElementById(id);
const show = id => $(id)?.classList.remove('hidden');
const hide = id => $(id)?.classList.add('hidden');

// ═══ KEY MANAGEMENT ═══
function initKey() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) { $('keyInput').value = saved; show('keyForget'); }
  } catch(e) {}
  $('keyInput').addEventListener('keydown', e => { if (e.key === 'Enter') unlockApp(); });
}

function unlockApp() {
  const k = $('keyInput').value.trim();
  if (!k.startsWith('sk-ant-')) {
    $('keyError').textContent = 'Key should start with sk-ant-';
    show('keyError');
    return;
  }
  hide('keyError');
  apiKey = k;
  if ($('keyRemember').checked) {
    try { localStorage.setItem(STORAGE_KEY, k); } catch(e) {}
  }
  hide('keyScreen');
  show('appScreen');
}

function forgetKey() {
  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
  $('keyInput').value = '';
  hide('keyForget');
}

function showKeyScreen() {
  hide('appScreen');
  show('keyScreen');
}

// ═══ INPUT ═══
function switchMode(mode) {
  inputMode = mode;
  if (mode === 'paste') {
    $('segPaste').classList.add('active');
    $('segUrl').classList.remove('active');
    show('pasteArea'); hide('urlArea');
  } else {
    $('segUrl').classList.add('active');
    $('segPaste').classList.remove('active');
    hide('pasteArea'); show('urlArea');
  }
  checkInput();
}

function checkInput() {
  const has = inputMode === 'paste'
    ? $('contentInput').value.trim().length > 0
    : $('urlInput').value.trim().length > 0;
  $('analyzeBtn').disabled = !has;
}

function getPayload() {
  if (inputMode === 'url' && $('urlInput').value.trim()) {
    return 'Please fetch and analyze the content at this URL: ' + $('urlInput').value.trim();
  }
  return $('contentInput').value.trim();
}

function updateWordCount() {
  const words = $('contentInput').value.trim().split(/\s+/).filter(Boolean).length;
  if (words > 0) {
    $('wordCount').textContent = words.toLocaleString() + ' words';
    show('wordCount');
  } else {
    hide('wordCount');
  }
}

// ═══ API CALL ═══
async function callClaude(model, systemPrompt, userContent, onChunk, useWebSearch) {
  const body = {
    model, max_tokens: 4000, stream: true,
    system: systemPrompt,
    messages: [{ role: 'user', content: userContent }],
  };
  if (useWebSearch) {
    body.tools = [{ type: 'web_search_20250305', name: 'web_search' }];
  }

  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify(body),
  });

  if (!resp.ok) throw new Error('API error: ' + resp.status);

  const reader = resp.body.getReader();
  const decoder = new TextDecoder();
  let full = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    const chunk = decoder.decode(value, { stream: true });
    for (const line of chunk.split('\n')) {
      if (!line.startsWith('data: ')) continue;
      const data = line.slice(6);
      if (data === '[DONE]') continue;
      try {
        const p = JSON.parse(data);
        if (p.type === 'content_block_delta' && p.delta?.text) {
          full += p.delta.text;
          onChunk(full);
        }
      } catch(e) {}
    }
  }
  return full;
}

// ═══ SECTION PARSER ═══
function parseSections(text) {
  const defs = [
    { key:'facts', title:'Key Facts & Summary', icon:'📋', re:/KEY FACTS & SUMMARY/i },
    { key:'cred', title:'Source & Credibility', icon:'🔍', re:/SOURCE & CREDIBILITY/i },
    { key:'bias', title:'Bias & Rhetorical Analysis', icon:'🎯', re:/BIAS & RHETORICAL ANALYSIS/i },
    { key:'missing', title:"What's Missing", icon:'🌫️', re:/WHAT'S MISSING/i },
    { key:'bottom', title:'Bottom Line', icon:'⚖️', re:/BOTTOM LINE/i },
    { key:'war', title:'5GW Assessment', icon:'🛡️', re:/5TH GENERATION WARFARE|5GW/i },
  ];
  const found = defs.map(d => { const m = text.match(d.re); return m ? {...d, idx: m.index} : null; })
    .filter(Boolean).sort((a,b) => a.idx - b.idx);
  if (!found.length) return null;
  return found.map((s, i) => {
    const end = i+1 < found.length ? found[i+1].idx : text.length;
    const content = text.slice(s.idx, end).replace(s.re, '').replace(/^[\s\n—\-:]+/, '').trim();
    return { key:s.key, title:s.title, icon:s.icon, content };
  });
}

function renderSections(sections) {
  const container = $('deepSections');
  container.innerHTML = '';
  sections.forEach(s => {
    const div = document.createElement('div');
    div.innerHTML = `
      <button class="section-btn" onclick="this.nextElementSibling.classList.toggle('hidden'); this.querySelector('.section-arrow').classList.toggle('open')">
        <span class="section-icon">${s.icon}</span>
        <span class="section-title">${s.title}</span>
        <span class="section-arrow open">▼</span>
      </button>
      <div class="section-body"><p>${escHtml(s.content)}</p></div>
    `;
    container.appendChild(div);
  });
}

function escHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ═══ FLOW ═══
function showError(msg) { $('errorBox').textContent = msg; show('errorBox'); }
function clearError() { hide('errorBox'); }

async function startSummary() {
  const payload = getPayload();
  if (!payload) return;
  clearError();
  summaryText = ''; analysisText = ''; spiritualTextVal = '';
  isStreaming = true;

  hide('inputSection');
  show('results');
  show('summaryCard');
  show('summaryDots');
  hide('summaryActions'); hide('deepCard'); hide('spiritualBtn'); hide('spiritualCard'); hide('resetBtn');
  $('summaryText').textContent = '';
  $('deepSections').innerHTML = '';

  const useSearch = inputMode === 'url' && $('urlInput').value.trim();
  try {
    summaryText = await callClaude(HAIKU, PROMPT_SUMMARY, payload,
      text => { $('summaryText').textContent = text; }, useSearch);
    hide('summaryDots');
    show('summaryActions');
    show('resetBtn');
    isStreaming = false;
  } catch(e) {
    hide('summaryDots');
    showError(e.message);
    show('inputSection'); hide('results');
    isStreaming = false;
  }
}

async function startDeepAnalysis() {
  clearError();
  analysisText = '';
  isStreaming = true;

  hide('summaryActions');
  show('deepCard');
  show('deepStreaming');
  hide('resetBtn');
  $('deepStreamText').textContent = '';
  $('deepSections').innerHTML = '';
  show('deepDots');

  const payload = getPayload();
  const useSearch = inputMode === 'url' && $('urlInput').value.trim();
  try {
    analysisText = await callClaude(SONNET, PROMPT_DEEP, payload,
      text => { $('deepStreamText').textContent = text; }, useSearch);
    hide('deepDots');
    const sections = parseSections(analysisText);
    if (sections) {
      hide('deepStreaming');
      renderSections(sections);
    }
    show('spiritualBtn');
    show('resetBtn');
    isStreaming = false;
  } catch(e) {
    hide('deepDots');
    showError(e.message);
    show('summaryActions');
    hide('deepCard');
    show('resetBtn');
    isStreaming = false;
  }
}

async function startSpiritual() {
  clearError();
  spiritualTextVal = '';
  isStreaming = true;

  hide('summaryActions'); hide('spiritualBtn');
  show('spiritualCard');
  show('spiritualDots');
  hide('resetBtn');
  $('spiritualText').textContent = '';

  const prior = analysisText || summaryText;
  let base;
  if (inputMode === 'url' && $('urlInput').value.trim()) {
    base = 'Original content URL: ' + $('urlInput').value.trim() + '\n\nPrior analysis:\n' + prior;
  } else {
    base = 'Original content:\n' + $('contentInput').value.trim().slice(0, 2000) + '\n\nPrior analysis:\n' + prior;
  }

  try {
    spiritualTextVal = await callClaude(SONNET, PROMPT_SPIRITUAL, base,
      text => { $('spiritualText').textContent = text; }, false);
    hide('spiritualDots');
    show('resetBtn');
    isStreaming = false;
  } catch(e) {
    hide('spiritualDots');
    showError(e.message);
    show('resetBtn');
    isStreaming = false;
  }
}

function resetAll() {
  $('contentInput').value = '';
  $('urlInput').value = '';
  summaryText = ''; analysisText = ''; spiritualTextVal = '';
  hide('results'); hide('errorBox');
  hide('summaryCard'); hide('summaryActions'); hide('deepCard');
  hide('spiritualBtn'); hide('spiritualCard'); hide('resetBtn');
  hide('wordCount');
  $('deepSections').innerHTML = '';
  show('inputSection');
  checkInput();
}

// ═══ INIT ═══
window.addEventListener('DOMContentLoaded', () => {
  initKey();
  $('contentInput').addEventListener('input', () => { checkInput(); updateWordCount(); });
  $('urlInput').addEventListener('input', checkInput);
  $('urlInput').addEventListener('keydown', e => { if (e.key === 'Enter') startSummary(); });
});
