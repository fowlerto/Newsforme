<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Clear Eye — Media Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0f0e0c;
    --paper: #f5f0e8;
    --cream: #ede7d9;
    --accent: #c0392b;
    --accent2: #8b6914;
    --muted: #6b6355;
    --border: #c8bfad;
    --card: #faf7f2;
    --shadow: rgba(15,14,12,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    background: var(--ink);
    color: var(--paper);
    padding: 20px 20px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 3px solid var(--accent);
  }
  .masthead {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 2px;
  }
  .masthead h1 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 900;
    letter-spacing: -0.5px;
    line-height: 1;
  }
  .masthead .eyelet {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 500;
  }
  .tagline {
    font-size: 11px;
    color: #9a9080;
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.5px;
  }

  /* MAIN */
  main {
    padding: 20px 16px 100px;
    max-width: 520px;
    margin: 0 auto;
  }

  /* INPUT CARD */
  .input-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 18px;
    margin-bottom: 16px;
    box-shadow: 2px 3px 0 var(--shadow);
  }
  .input-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--accent2);
    text-transform: uppercase;
    margin-bottom: 8px;
    display: block;
  }
  .tab-row {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 12px;
  }
  .tab-btn {
    flex: 1;
    background: transparent;
    border: none;
    padding: 8px 4px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  .tab-btn.active {
    background: var(--ink);
    color: var(--paper);
  }
  textarea, input[type="url"] {
    width: 100%;
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 12px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    color: var(--ink);
    resize: none;
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }
  textarea:focus, input[type="url"]:focus { border-color: var(--accent2); }
  textarea { height: 140px; }
  input[type="url"] { height: 46px; }
  ::placeholder { color: #b0a898; font-style: italic; font-size: 13px; }

  .analyze-btn {
    width: 100%;
    margin-top: 12px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 3px;
    padding: 14px;
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 700;
    font-style: italic;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: all 0.15s;
    box-shadow: 2px 2px 0 rgba(192,57,43,0.3);
  }
  .analyze-btn:hover { background: #a93226; transform: translateY(-1px); }
  .analyze-btn:active { transform: translateY(0); }
  .analyze-btn:disabled { background: #c8bfad; cursor: not-allowed; transform: none; box-shadow: none; }

  /* MESSAGES */
  .messages { display: flex; flex-direction: column; gap: 14px; }

  .msg {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 16px;
    box-shadow: 1px 2px 0 var(--shadow);
    animation: slideIn 0.25s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .msg-label.analyst { color: var(--accent); }
  .msg-label.user { color: var(--accent2); }

  .msg-body {
    font-size: 14.5px;
    line-height: 1.7;
    color: #2a2520;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* Section headings inside analysis */
  .msg-body h3 {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 700;
    margin: 14px 0 6px;
    color: var(--ink);
    border-left: 3px solid var(--accent);
    padding-left: 8px;
  }

  /* CHOICES */
  .choices-card {
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px 16px;
    animation: slideIn 0.25s ease;
  }
  .choices-question {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 700;
    font-style: italic;
    margin-bottom: 10px;
    color: var(--ink);
  }
  .choice-btn {
    display: block;
    width: 100%;
    background: white;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 11px 14px;
    margin-bottom: 7px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13.5px;
    color: var(--ink);
    text-align: left;
    cursor: pointer;
    transition: all 0.12s;
    box-shadow: 1px 1px 0 var(--shadow);
  }
  .choice-btn:last-child { margin-bottom: 0; }
  .choice-btn:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .choice-btn:active { transform: scale(0.98); }

  /* LOADING */
  .loading-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 20px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    animation: slideIn 0.2s ease;
  }
  .loading-dots {
    display: flex;
    gap: 5px;
  }
  .loading-dots span {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    animation: bounce 1.2s ease-in-out infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; background: var(--accent2); }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%,80%,100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }
  .loading-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  /* RESET */
  .reset-bar {
    text-align: center;
    margin-top: 18px;
  }
  .reset-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 8px 20px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  .reset-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* DIVIDER */
  .rule {
    border: none;
    border-top: 1px solid var(--border);
    margin: 4px 0 14px;
  }
  .rule-label {
    text-align: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: var(--border);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
</style>
</head>
<body>

<header>
  <div class="masthead">
    <h1>Clear Eye</h1>
    <span class="eyelet">// Media Analyzer</span>
  </div>
  <p class="tagline">See through the noise — bias, rhetoric & the bigger picture</p>
</header>

<main>
  <!-- INPUT -->
  <div class="input-card" id="inputCard">
    <span class="input-label">Paste article or enter URL</span>
    <div class="tab-row">
      <button class="tab-btn active" onclick="switchTab('text')">Text / Paste</button>
      <button class="tab-btn" onclick="switchTab('url')">URL</button>
    </div>
    <div id="textInput">
      <textarea id="articleText" placeholder="Paste the article, transcript, post, or any media content here…"></textarea>
    </div>
    <div id="urlInput" style="display:none">
      <input type="url" id="articleUrl" placeholder="https://…">
    </div>
    <button class="analyze-btn" onclick="startAnalysis()">Analyze →</button>
  </div>

  <hr class="rule">
  <p class="rule-label" id="analysisLabel" style="display:none">— Analysis —</p>

  <!-- CONVERSATION -->
  <div class="messages" id="messages"></div>

  <div id="resetBar" class="reset-bar" style="display:none">
    <button class="reset-btn" onclick="resetAll()">↺ New Article</button>
  </div>
</main>

<script>
const SYSTEM_PROMPT = `You are an experienced political and cultural analyst with deep knowledge of media, rhetoric, and information warfare. You are also a knowledgeable Christian theologian grounded in Scripture. You never lie or make up information or sources. When you don't know something, you say so. When you cite a source, it's real. When you reference Scripture, you use accurate verses and citations.

You write in plain everyday language. No jargon. Like a smart, honest friend — direct, specific, and never bland.

Your task: analyze media content for bias, credibility, key facts, rhetorical techniques, and 5th generation warfare indicators. The user will provide text or a URL to an article, post, transcript, or other media content.

OPENING SUMMARY (your first response):
Write a tight 3-5 sentence paragraph in plain everyday language. Cover what the article says, where it appears biased or incomplete, and your honest take. No headers. No bullet points. No markdown formatting. Just a conversational paragraph.

End your response with exactly this line on its own:
CHOICES:deeper_or_done

DEEPER SUMMARY (when requested):
Write 2-3 paragraphs. No headers, no bullet points. Cover:
- What the article is really claiming
- Where it's biased, what it leaves out, how it steers the reader
- Gray areas being flattened
- How much to trust it

End your response with:
CHOICES:spiritual

FULL ANALYSIS (when requested):
Deliver section-by-section. Use these exact section headers (prefixed with ###):
### Key Facts & Summary
### Source & Credibility
### Bias & Rhetorical Analysis
### What's Missing — The Gray Area
### Bottom Line
### 5th Generation Warfare Assessment

Note: You cannot fetch URLs yourself in this app. If the user provides a URL, acknowledge you are analyzing based on the URL provided, and ask them to also paste the text if possible, OR attempt to analyze from the URL alone if you recognize the source. Be honest about limitations.

After any analysis, end with:
CHOICES:spiritual

SPIRITUAL PERSPECTIVE (when requested):
1-3 paragraphs. Fresh, specific, conversational — like talking to a thoughtful believer over coffee. Use accurate Bible verses (book, chapter, verse) naturally where they fit. Never formulaic.

End with:
CHOICES:done

When you see CHOICES:done, respond with exactly: DONE

Keep all responses plain text — no markdown bold/italic, no bullet dashes, just clean prose and the ### headers for full analysis sections only.`;

let conversationHistory = [];
let currentMode = 'text';
let awaitingChoice = null;
let articleContent = '';

function switchTab(mode) {
  currentMode = mode;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('textInput').style.display = mode === 'text' ? 'block' : 'none';
  document.getElementById('urlInput').style.display = mode === 'url' ? 'block' : 'none';
}

async function startAnalysis() {
  const text = currentMode === 'text'
    ? document.getElementById('articleText').value.trim()
    : document.getElementById('articleUrl').value.trim();

  if (!text) { alert('Please paste an article or enter a URL first.'); return; }

  articleContent = text;
  document.getElementById('inputCard').style.display = 'none';
  document.getElementById('analysisLabel').style.display = 'block';
  document.getElementById('resetBar').style.display = 'block';

  const userMsg = currentMode === 'text'
    ? `Please analyze this article:\n\n${text}`
    : `Please analyze this article: ${text}`;

  conversationHistory.push({ role: 'user', content: userMsg });
  addUserBubble(currentMode === 'text' ? '📄 Article submitted for analysis' : `🔗 ${text}`);
  await callClaude('Reading between the lines…');
}

async function handleChoice(choice, displayLabel) {
  awaitingChoice = null;
  removeChoices();
  addUserBubble(displayLabel);
  conversationHistory.push({ role: 'user', content: choice });
  await callClaude('Digging deeper…');
}

async function callClaude(loadingMsg) {
  const loadingEl = addLoading(loadingMsg);

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });

    const data = await response.json();
    loadingEl.remove();

    const rawText = data.content?.map(b => b.text || '').join('') || '';
    const [mainText, choicesTag] = splitOnChoices(rawText);

    if (mainText.trim()) {
      addAssistantBubble(mainText.trim());
      conversationHistory.push({ role: 'assistant', content: rawText });
    }

    if (choicesTag) {
      renderChoices(choicesTag);
    }

  } catch (err) {
    loadingEl.remove();
    addAssistantBubble('Something went wrong reaching the analysis service. Please try again.');
    console.error(err);
  }
}

function splitOnChoices(text) {
  const idx = text.indexOf('CHOICES:');
  if (idx === -1) return [text, null];
  return [text.slice(0, idx).trim(), text.slice(idx + 8).trim()];
}

function renderChoices(tag) {
  const container = document.getElementById('messages');
  const card = document.createElement('div');
  card.className = 'choices-card';
  card.id = 'choicesCard';

  if (tag === 'deeper_or_done') {
    card.innerHTML = `
      <p class="choices-question">Want to go deeper?</p>
      <button class="choice-btn" onclick="handleChoice('Please give me a deeper summary.', 'Deeper summary')">Deeper summary</button>
      <button class="choice-btn" onclick="handleChoice('Please give me the full analysis.', 'Full analysis')">Full analysis</button>
      <button class="choice-btn" onclick="handleChoice('That is enough, thanks.', "That's enough, thanks")">That's enough, thanks</button>
    `;
  } else if (tag === 'spiritual') {
    card.innerHTML = `
      <p class="choices-question">Would you like a spiritual perspective on this?</p>
      <button class="choice-btn" onclick="handleChoice('Yes, please give me a spiritual perspective.', 'Yes — spiritual perspective')">Yes</button>
      <button class="choice-btn" onclick="handleChoice('No thanks.', 'No thanks')">No thanks</button>
    `;
  } else if (tag === 'done') {
    // Analysis complete — no more choices needed
    return;
  }

  container.appendChild(card);
  card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function removeChoices() {
  const el = document.getElementById('choicesCard');
  if (el) el.remove();
}

function addUserBubble(text) {
  const el = document.createElement('div');
  el.className = 'msg';
  el.innerHTML = `<div class="msg-label user">You</div><div class="msg-body">${escapeHtml(text)}</div>`;
  document.getElementById('messages').appendChild(el);
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function addAssistantBubble(text) {
  const el = document.createElement('div');
  el.className = 'msg';
  // Convert ### headers to h3 tags
  const formatted = text
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/\n/g, '<br>');
  el.innerHTML = `<div class="msg-label analyst">Clear Eye Analyst</div><div class="msg-body">${formatted}</div>`;
  document.getElementById('messages').appendChild(el);
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function addLoading(msg) {
  const el = document.createElement('div');
  el.className = 'loading-card';
  el.innerHTML = `
    <div class="loading-dots"><span></span><span></span><span></span></div>
    <span class="loading-text">${escapeHtml(msg)}</span>
  `;
  document.getElementById('messages').appendChild(el);
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  return el;
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function resetAll() {
  conversationHistory = [];
  articleContent = '';
  awaitingChoice = null;
  document.getElementById('messages').innerHTML = '';
  document.getElementById('inputCard').style.display = 'block';
  document.getElementById('analysisLabel').style.display = 'none';
  document.getElementById('resetBar').style.display = 'none';
  document.getElementById('articleText').value = '';
  document.getElementById('articleUrl').value = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
